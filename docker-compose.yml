services:
  neurostack_crowd_intelligence_simulator:
    build:
      context: .
      dockerfile: Dockerfile
    image: neurostack-crowd-intelligence-simulator:local
    # Or pull a pre-built image instead of building:
    # image: ghcr.io/kkahol-toronto/neurostack-crowd-intelligence-simulator:latest
    container_name: neurostack_crowd_intelligence_simulator
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
