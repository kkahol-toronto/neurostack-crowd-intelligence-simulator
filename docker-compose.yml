services:
  neurostack_crowd_intelligence_simulator:
    image: ghcr.io/neurostack/neurostack-crowd-intelligence-simulator:latest
    # Mirror URL — replace if pulls are slow
    # image: ghcr.nju.edu.cn/neurostack/neurostack-crowd-intelligence-simulator:latest
    container_name: neurostack_crowd_intelligence_simulator
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
